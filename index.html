<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEBULA EXCHANGE — крипто биржа в стиле Binance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0B0E11;
            color: #EAECEF;
            overflow-x: hidden;
        }

        /* ========== АНИМИРОВАННЫЙ ЗВЁЗДНЫЙ ФОН ========== */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, #0B0E11 0%, #000000 100%);
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(1); }
        }

        /* ========== СТРАНИЦА ВХОДА ========== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 14, 17, 0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            text-align: center;
            padding: 48px 40px;
            background: #1E2329;
            border-radius: 20px;
            border: 1px solid #2B3139;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .galaxy-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
        }
        .galaxy-logo svg { width: 100%; height: 100%; }
        .login-card h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #F0B90B, #FCD535);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .login-card .subtitle {
            color: #848E9C;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            background: #2B3139;
            border: 1px solid #474D57;
            color: #EAECEF;
            font-size: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.2s;
        }
        .login-card input:focus {
            border-color: #F0B90B;
            box-shadow: 0 0 0 2px rgba(240, 185, 11, 0.2);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: #F0B90B;
            border: none;
            color: #0B0E11;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .login-card button:hover {
            background: #FCD535;
        }
        .make-token-text {
            margin-top: 24px;
            font-size: 12px;
            color: #848E9C;
        }

        /* ========== ОСНОВНОЙ ИНТЕРФЕЙС БИРЖИ (BINANCE СТИЛЬ) ========== */
        .exchange-interface {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }
        .exchange-interface.active {
            display: block;
        }

        /* Верхняя панель */
        .binance-header {
            background: #0B0E11;
            border-bottom: 1px solid #2B3139;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #F0B90B, #FCD535);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            background: #1E2329;
            padding: 8px 16px;
            border-radius: 30px;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            background: #F0B90B;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0B0E11;
            font-weight: bold;
        }
        .user-name {
            color: #F0B90B;
            font-weight: 500;
        }

        /* Основной контент */
        .binance-main {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 0;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Левая колонка - списoк токенов */
        .token-list-section {
            border-right: 1px solid #2B3139;
            min-height: calc(100vh - 60px);
        }
        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2B3139;
        }
        .section-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #F0B90B;
        }
        .section-header p {
            font-size: 13px;
            color: #848E9C;
            margin-top: 4px;
        }
        .token-table {
            width: 100%;
        }
        .token-table-header {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 100px;
            padding: 12px 24px;
            background: #13161A;
            color: #848E9C;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 1px solid #2B3139;
        }
        .token-row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 120px 100px;
            padding: 16px 24px;
            border-bottom: 1px solid #2B3139;
            cursor: pointer;
            transition: background 0.2s;
            align-items: center;
        }
        .token-row:hover {
            background: #1E2329;
        }
        .token-rank {
            color: #848E9C;
            font-size: 14px;
        }
        .token-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .token-symbol {
            font-weight: 600;
            color: #F0B90B;
        }
        .token-name {
            font-size: 12px;
            color: #848E9C;
        }
        .token-price {
            font-weight: 500;
        }
        .token-change {
            font-size: 14px;
        }
        .token-change.positive { color: #0ECB81; }
        .token-change.negative { color: #F6465D; }
        .token-volume {
            color: #848E9C;
            font-size: 13px;
        }
        .trade-btn {
            background: #F0B90B;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: #0B0E11;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .trade-btn:hover {
            background: #FCD535;
        }

        /* Правая колонка - кошелёк и торговля */
        .right-panel {
            padding: 20px;
            background: #0B0E11;
        }
        .wallet-card {
            background: #1E2329;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .wallet-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #F0B90B;
        }
        .balance-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #2B3139;
        }
        .balance-asset {
            font-weight: 500;
        }
        .balance-amount {
            color: #F0B90B;
        }
        .trade-card {
            background: #1E2329;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .trade-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .create-token-card {
            background: #1E2329;
            border-radius: 16px;
            padding: 20px;
        }
        .create-token-card input, .trade-card input, .trade-card select {
            width: 100%;
            padding: 10px 12px;
            background: #2B3139;
            border: 1px solid #474D57;
            color: #EAECEF;
            border-radius: 8px;
            margin-bottom: 12px;
            outline: none;
        }
        .create-token-card input:focus, .trade-card input:focus {
            border-color: #F0B90B;
        }
        .btn-gold {
            background: #F0B90B;
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: #0B0E11;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: #FCD535;
        }
        .order-book {
            max-height: 300px;
            overflow-y: auto;
        }
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }
        .order-buy { color: #0ECB81; }
        .order-sell { color: #F6465D; }
        hr {
            border-color: #2B3139;
            margin: 16px 0;
        }

        @media (max-width: 1000px) {
            .binance-main { grid-template-columns: 1fr; }
            .token-list-section { border-right: none; }
        }
    </style>
</head>
<body>

<div class="starfield" id="starfield"></div>

<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="galaxy-logo">
            <svg viewBox="0 0 100 100">
                <rect width="100" height="100" fill="#1E2329" rx="20"/>
                <g>
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="15s" repeatCount="indefinite"/>
                    <path d="M50 8 Q72 28 50 50 Q28 72 50 92" stroke="#F0B90B" stroke-width="1.2" fill="none"/>
                </g>
                <circle cx="50" cy="50" r="5" fill="#F0B90B">
                    <animate attributeName="r" values="3;6;3" dur="1.5s" repeatCount="indefinite"/>
                </circle>
                <circle cx="25" cy="20" r="1.2" fill="white"/>
                <circle cx="75" cy="25" r="1" fill="white"/>
                <circle cx="30" cy="75" r="0.9" fill="white"/>
                <circle cx="70" cy="72" r="1.1" fill="white"/>
            </svg>
        </div>
        <h1>NEBULA</h1>
        <div class="subtitle">✦ создай свой токен ✦</div>
        <input type="text" id="loginUsername" placeholder="Введите имя">
        <button id="enterBtn">🚀 ВОЙТИ В NEBULA 🚀</button>
        <div class="make-token-text">⚡ КАЖДЫЙ МОЖЕТ СОЗДАТЬ ТОКЕН ⚡</div>
    </div>
</div>

<div class="exchange-interface" id="exchangeInterface">
    <div class="binance-header">
        <div class="logo-area">
            <div class="logo-icon">
                <svg width="32" height="32" viewBox="0 0 100 100">
                    <path d="M50 8 Q72 28 50 50 Q28 72 50 92" stroke="#F0B90B" stroke-width="1.5" fill="none">
                        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="10s" repeatCount="indefinite"/>
                    </path>
                    <circle cx="50" cy="50" r="4" fill="#F0B90B"/>
                </svg>
            </div>
            <span class="logo-text">NEBULA EXCHANGE</span>
        </div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span class="user-name" id="userNameDisplay"></span>
        </div>
    </div>

    <div class="binance-main">
        <!-- ЛЕВАЯ КОЛОНКА: ЛИСТ ТОКЕНОВ -->
        <div class="token-list-section">
            <div class="section-header">
                <h2>📊 РЫНОК ТОКЕНОВ</h2>
                <p>Все созданные токены | Объём за 24ч</p>
            </div>
            <div class="token-table">
                <div class="token-table-header">
                    <span>#</span>
                    <span>Токен</span>
                    <span>Цена (USDT)</span>
                    <span>24ч %</span>
                    <span>Торговать</span>
                </div>
                <div id="tokenListContainer"></div>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: КОШЕЛЁК + ТОРГОВЛЯ -->
        <div class="right-panel">
            <div class="wallet-card">
                <div class="wallet-title">💼 МОЙ КОШЕЛЕК</div>
                <div id="walletBalances"></div>
                <hr>
                <input type="text" id="transferTo" placeholder="Кому отправить">
                <input type="text" id="transferSymbol" placeholder="Актив (USDT или TOKEN_XXX)">
                <input type="number" id="transferAmount" placeholder="Сумма">
                <button class="btn-gold" id="transferBtn">ОТПРАВИТЬ</button>
            </div>

            <div class="trade-card">
                <div class="trade-title">📈 СОЗДАТЬ ТОКЕН</div>
                <input type="text" id="tokenName" placeholder="Название токена">
                <input type="text" id="tokenSymbol" placeholder="Символ (3-5 букв)">
                <input type="number" id="tokenSupply" placeholder="Эмиссия">
                <button class="btn-gold" id="createTokenBtn">✨ СОЗДАТЬ ТОКЕН ✨</button>
            </div>

            <div class="trade-card">
                <div class="trade-title">🔄 ТОРГОВЛЯ</div>
                <select id="tradeSymbolSelect"></select>
                <select id="orderType">
                    <option value="buy">🟢 ПОКУПКА</option>
                    <option value="sell">🔴 ПРОДАЖА</option>
                </select>
                <input type="number" id="orderPrice" placeholder="Цена в USDT">
                <input type="number" id="orderAmount" placeholder="Количество">
                <button class="btn-gold" id="placeOrderBtn">РАЗМЕСТИТЬ ОРДЕР</button>
                <hr>
                <div class="trade-title" style="font-size:14px; margin-top:12px;">📖 КНИГА ОРДЕРОВ</div>
                <div id="orderBook" class="order-book"></div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ГЕНЕРАЦИЯ ЗВЁЗД
        function generateStars(){
            const sf = document.getElementById('starfield');
            if(!sf) return;
            for(let i=0;i<150;i++){
                let s = document.createElement('div');
                s.classList.add('star');
                s.style.width = (Math.random()*2+1)+'px';
                s.style.height = s.style.width;
                s.style.left = Math.random()*100+'%';
                s.style.top = Math.random()*100+'%';
                s.style.animationDuration = (Math.random()*2+1)+'s';
                s.style.animationDelay = (Math.random()*5)+'s';
                sf.appendChild(s);
            }
        }
        generateStars();

        // СОСТОЯНИЕ
        let state = { wallets: {}, tokens: {}, orders: {} };
        let currentUser = null;

        function saveData(){ localStorage.setItem('NebulaExchange', JSON.stringify(state)); }
        
        function loadData(){
            let raw = localStorage.getItem('NebulaExchange');
            if(!raw){
                state = { wallets: { system: { balance: { USDT: 1000000000 } } }, tokens: {}, orders: {} };
                saveData();
            } else {
                state = JSON.parse(raw);
            }
        }
        loadData();

        function ensureWallet(name){
            if(!state.wallets[name]){
                state.wallets[name] = { balance: { USDT: 10000 } };
                saveData();
            }
        }

        function getBalance(name, asset){
            ensureWallet(name);
            return state.wallets[name].balance[asset] || 0;
        }

        // Генерация случайной цены для токена (на основе объёма торгов)
        function getTokenPrice(symbol){
            let orders = state.orders[symbol] || [];
            let sells = orders.filter(o => o.type === 'sell');
            let buys = orders.filter(o => o.type === 'buy');
            if(sells.length > 0 && sells[0].price) return sells.sort((a,b)=>a.price-b.price)[0].price;
            if(buys.length > 0 && buys[0].price) return buys.sort((a,b)=>b.price-a.price)[0].price;
            // дефолтная цена
            return 0.5 + (Object.keys(state.tokens).indexOf(symbol) * 0.1);
        }

        function createToken(creator, name, symbol, supply){
            symbol = symbol.toUpperCase().trim();
            if(!symbol.match(/^[A-Z0-9]{2,8}$/)) return { error: "Символ 2-8 букв/цифр" };
            if(state.tokens[symbol]) return { error: "Токен существует" };
            if(!Number.isInteger(supply) || supply<=0) return { error: "Эмиссия >0 целое" };
            ensureWallet(creator);
            state.tokens[symbol] = { name: name.substring(0,30), symbol, totalSupply: supply, creator, createdAt: Date.now() };
            let asset = `TOKEN_${symbol}`;
            if(!state.wallets[creator].balance[asset]) state.wallets[creator].balance[asset] = 0;
            state.wallets[creator].balance[asset] += supply;
            if(!state.orders[symbol]) state.orders[symbol] = [];
            saveData();
            return { success: true, symbol, amount: supply };
        }

        function transfer(from, to, asset, amount){
            if(from===to) return { error: "Себе нельзя" };
            if(amount<=0) return { error: "Сумма >0" };
            ensureWallet(from); ensureWallet(to);
            if(getBalance(from, asset) < amount) return { error: "Недостаточно" };
            state.wallets[from].balance[asset] -= amount;
            if(!state.wallets[to].balance[asset]) state.wallets[to].balance[asset] = 0;
            state.wallets[to].balance[asset] += amount;
            saveData();
            return { success: true };
        }

        function matchOrders(tokenSymbol){
            let orders = state.orders[tokenSymbol];
            if(!orders || orders.length<2) return;
            let changed = true;
            let iter = 0;
            while(changed && iter<50){
                changed = false;
                iter++;
                let buys = orders.filter(o=>o.type==='buy' && o.amount>0).sort((a,b)=>b.price-a.price);
                let sells = orders.filter(o=>o.type==='sell' && o.amount>0).sort((a,b)=>a.price-b.price);
                for(let buy of buys){
                    for(let sell of sells){
                        if(buy.price >= sell.price && buy.amount>0 && sell.amount>0){
                            let trade = Math.min(buy.amount, sell.amount);
                            let price = sell.price;
                            let tokenAsset = `TOKEN_${tokenSymbol}`;
                            ensureWallet(buy.user); ensureWallet(sell.user);
                            if(!state.wallets[buy.user].balance[tokenAsset]) state.wallets[buy.user].balance[tokenAsset] = 0;
                            state.wallets[buy.user].balance[tokenAsset] += trade;
                            state.wallets[sell.user].balance["USDT"] += price * trade;
                            buy.amount -= trade;
                            sell.amount -= trade;
                            changed = true;
                            break;
                        }
                    }
                    if(changed) break;
                }
                orders = orders.filter(o=>o.amount>0);
                state.orders[tokenSymbol] = orders;
            }
            if(changed) saveData();
        }

        function placeOrder(user, tokenSymbol, type, price, amount){
            if(!state.tokens[tokenSymbol]) return { error: "Нет токена" };
            if(price<=0 || amount<=0) return { error: "Цена и количество >0" };
            ensureWallet(user);
            let tokenAsset = `TOKEN_${tokenSymbol}`;
            if(type==='sell'){
                if(getBalance(user, tokenAsset) < amount) return { error: "Мало токенов" };
                state.wallets[user].balance[tokenAsset] -= amount;
            } else {
                let cost = price * amount;
                if(getBalance(user, "USDT") < cost) return { error: `Нужно ${cost.toFixed(2)} USDT` };
                state.wallets[user].balance["USDT"] -= cost;
            }
            let order = { id: Date.now()+Math.random(), user, type, price, amount, tokenSymbol };
            if(!state.orders[tokenSymbol]) state.orders[tokenSymbol] = [];
            state.orders[tokenSymbol].push(order);
            saveData();
            matchOrders(tokenSymbol);
            return { success: true };
        }

        function matchAll(){ for(let s in state.tokens) matchOrders(s); }

        function getOrdersForDisplay(sym){
            let ord = state.orders[sym] || [];
            let buys = ord.filter(o=>o.type==='buy').sort((a,b)=>b.price-a.price).slice(0,8);
            let sells = ord.filter(o=>o.type==='sell').sort((a,b)=>a.price-b.price).slice(0,8);
            return { buys, sells };
        }

        // ОТРИСОВКА ЛИСТА ТОКЕНОВ (Binance стиль)
        function renderTokenList(){
            let container = document.getElementById('tokenListContainer');
            if(!container) return;
            let tokens = Object.keys(state.tokens);
            if(tokens.length === 0){
                container.innerHTML = '<div style="padding:40px;text-align:center;color:#848E9C;">✨ Создайте первый токен ✨</div>';
                return;
            }
            container.innerHTML = '';
            tokens.forEach((sym, idx) => {
                let token = state.tokens[sym];
                let price = getTokenPrice(sym);
                let change = (Math.random() * 20 - 10).toFixed(2); // демо-изменение
                let changeClass = parseFloat(change) >= 0 ? 'positive' : 'negative';
                let changeSign = parseFloat(change) >= 0 ? `+${change}%` : `${change}%`;
                let row = document.createElement('div');
                row.className = 'token-row';
                row.innerHTML = `
                    <div class="token-rank">${idx+1}</div>
                    <div class="token-info">
                        <div>
                            <div class="token-symbol">${sym}</div>
                            <div class="token-name">${token.name}</div>
                        </div>
                    </div>
                    <div class="token-price">$${price.toFixed(6)}</div>
                    <div class="token-change ${changeClass}">${changeSign}</div>
                    <div><button class="trade-btn" data-symbol="${sym}">Торговать</button></div>
                `;
                container.appendChild(row);
            });
            // обработчики кнопок торговли
            document.querySelectorAll('.trade-btn').forEach(btn => {
                btn.onclick = (e) => {
                    let sym = btn.getAttribute('data-symbol');
                    let select = document.getElementById('tradeSymbolSelect');
                    if(select && sym){
                        select.value = sym;
                        updateOrderBook();
                    }
                };
            });
        }

        function updateWalletUI(){
            if(!currentUser) return;
            ensureWallet(currentUser);
            let container = document.getElementById('walletBalances');
            if(!container) return;
            container.innerHTML = '';
            let b = state.wallets[currentUser].balance;
            for(let a in b){
                let div = document.createElement('div');
                div.className = 'balance-item';
                div.innerHTML = `<span class="balance-asset">${a}</span><span class="balance-amount">${b[a].toFixed(6)}</span>`;
                container.appendChild(div);
            }
        }

        function updateTokenSelect(){
            let sel = document.getElementById('tradeSymbolSelect');
            if(!sel) return;
            let old = sel.value;
            sel.innerHTML = '';
            for(let s in state.tokens){
                let opt = document.createElement('option');
                opt.value = s;
                opt.textContent = `${state.tokens[s].name} (${s})`;
                sel.appendChild(opt);
            }
            if(old && state.tokens[old]) sel.value = old;
            updateOrderBook();
        }

        function updateOrderBook(){
            let sel = document.getElementById('tradeSymbolSelect');
            if(!sel) return;
            let sym = sel.value;
            if(!sym || !state.tokens[sym]){
                let book = document.getElementById('orderBook');
                if(book) book.innerHTML = '<div class="order-row">Выберите токен</div>';
                return;
            }
            let { buys, sells } = getOrdersForDisplay(sym);
            let book = document.getElementById('orderBook');
            book.innerHTML = '<div style="color:#F0B90B; margin-bottom:8px;">🔴 ПРОДАВЦЫ</div>';
            if(sells.length===0) book.innerHTML += '<div class="order-row">— нет —</div>';
            sells.forEach(o=>{
                book.innerHTML += `<div class="order-row order-sell"><span>${o.user}</span><span>${o.amount.toFixed(2)}</span><span>${o.price.toFixed(4)} USDT</span></div>`;
            });
            book.innerHTML += '<div style="color:#F0B90B; margin:12px 0 8px;">🟢 ПОКУПАТЕЛИ</div>';
            if(buys.length===0) book.innerHTML += '<div class="order-row">— нет —</div>';
            buys.forEach(o=>{
                book.innerHTML += `<div class="order-row order-buy"><span>${o.user}</span><span>${o.amount.toFixed(2)}</span><span>${o.price.toFixed(4)} USDT</span></div>`;
            });
        }

        function updateAll(){
            if(!currentUser) return;
            updateWalletUI();
            renderTokenList();
            updateTokenSelect();
        }

        function showExchange(username){
            currentUser = username;
            ensureWallet(currentUser);
            localStorage.setItem('NebulaCurrentUser', currentUser);
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('exchangeInterface').classList.add('active');
            document.getElementById('userNameDisplay').innerText = currentUser;
            document.getElementById('userAvatar').innerHTML = currentUser.charAt(0).toUpperCase();
            updateAll();
            if(!window.matchInterval){
                window.matchInterval = setInterval(()=>{
                    if(currentUser){ matchAll(); updateAll(); }
                }, 3000);
            }
        }

        // АВТОВХОД
        let saved = localStorage.getItem('NebulaCurrentUser');
        if(saved && saved !== 'null' && saved !== 'undefined'){
            loadData();
            if(state.wallets && state.wallets[saved]){
                showExchange(saved);
            }
        }

        window.addEventListener('DOMContentLoaded', function(){
            document.getElementById('enterBtn').onclick = () => {
                let name = document.getElementById('loginUsername').value.trim();
                if(!name){ alert("Введите имя!"); return; }
                showExchange(name);
            };
            document.getElementById('loginUsername').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('enterBtn').click(); };
            
            document.getElementById('createTokenBtn').onclick = () => {
                if(!currentUser){ alert("Сначала войдите"); return; }
                let name = document.getElementById('tokenName').value.trim();
                let sym = document.getElementById('tokenSymbol').value.trim();
                let supply = parseInt(document.getElementById('tokenSupply').value);
                if(!name || !sym || isNaN(supply)){ alert("Заполните все поля"); return; }
                let res = createToken(currentUser, name, sym, supply);
                if(res.error) alert(res.error);
                else{
                    alert(`✅ Токен ${res.symbol} создан! Получено ${res.amount} шт.`);
                    document.getElementById('tokenName').value = '';
                    document.getElementById('tokenSymbol').value = '';
                    document.getElementById('tokenSupply').value = '';
                    updateAll();
                }
            };
            
            document.getElementById('placeOrderBtn').onclick = () => {
                if(!currentUser){ alert("Сначала войдите"); return; }
                let sym = document.getElementById('tradeSymbolSelect').value;
                if(!state.tokens[sym]){ alert("Выберите токен"); return; }
                let type = document.getElementById('orderType').value;
                let price = parseFloat(document.getElementById('orderPrice').value);
                let amount = parseFloat(document.getElementById('orderAmount').value);
                if(isNaN(price) || isNaN(amount)){ alert("Введите цену и количество"); return; }
                let res = placeOrder(currentUser, sym, type, price, amount);
                if(res.error) alert(res.error);
                else{
                    updateAll();
                    document.getElementById('orderPrice').value = '';
                    document.getElementById('orderAmount').value = '';
                }
            };
            
            document.getElementById('transferBtn').onclick = () => {
                if(!currentUser){ alert("Сначала войдите"); return; }
                let to = document.getElementById('transferTo').value.trim();
                let asset = document.getElementById('transferSymbol').value.trim();
                let amt = parseFloat(document.getElementById('transferAmount').value);
                if(!to || !asset || isNaN(amt)){ alert("Заполните перевод"); return; }
                let res = transfer(currentUser, to, asset, amt);
                if(res.error) alert(res.error);
                else{
                    updateAll();
                    document.getElementById('transferAmount').value = '';
                }
            };
            
            document.getElementById('tradeSymbolSelect').onchange = updateOrderBook;
        });
    })();
</script>
</body>
</html>
